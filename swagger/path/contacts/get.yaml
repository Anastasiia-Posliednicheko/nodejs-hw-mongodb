tags:
  - Contacts
summary: Get list of contacts
operationId: getContacts
description: 'Get all contacts with optional filters'
security:
  - bearerAuth: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      example: 1
  - in: query
    name: perPage
    schema:
      type: integer
      example: 10
  - in: query
    name: sortBy
    schema:
      type: string
      example: createdAt
  - in: query
    name: sortOrder
    schema:
      type: string
      enum: [asc, desc]
      example: desc
  - in: query
    name: type
    schema:
      type: string
      enum: [personal, home, work]
  - in: query
    name: isFavourite
    schema:
      type: boolean
responses:
  '200':
    description: List of contacts
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contacts!
            data:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../../components/schemas/contact.yaml'
                totalItems:
                  type: integer
                  example: 20
                totalPages:
                  type: integer
                  example: 2
                currentPage:
                  type: integer
                  example: 1
  '401':
    $ref: '../../../components/responses/401.yaml'
