patch:
  tags:
    - Contacts
  summary: Update contact by id
  operationId: patchContact
  description: Update one or more fields of the contact
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
        example: '65ca67e7ae7f10c88b598384'
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: '../../../components/schemas/contactUpdate.yaml'
  responses:
    '200':
      description: Contact successfully updated
      content:
        application/json:
          schema:
            type: object
            required:
              - status
              - message
              - data
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Successfully patched a contact!
              data:
                $ref: '../../components/schemas/contact.yaml'
    '404':
      $ref: '../../../components/responses/404.yaml'
    '401':
      $ref: '../../../components/responses/401.yaml'
