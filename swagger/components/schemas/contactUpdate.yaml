type: object
properties:
  name:
    type: string
    minLength: 3
    maxLength: 20
    example: 'Jane Doe'
  email:
    type: string
    format: email
    example: 'jane@example.com'
  phoneNumber:
    type: string
    minLength: 3
    maxLength: 20
    example: '+380991234567'
  isFavourite:
    type: boolean
    example: true
  contactType:
    type: string
    enum: ['personal', 'home', 'work']
    example: 'home'
